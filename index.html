# 1.01 Про меня и ваши цели

- **Модуль:** 1. Самопрезентация
- **Видео:** 1 01 Самопрезентация (урок) Про меня и ваши цели.mp4
- **Презентация:** 1 01 Самопрезентация (урок) Про меня и ваши цели.pdf
- **Хронометраж:** ~9 мин

## О чём урок
Вводный урок курса «Я говорю!»: тренер-коуч Евгений Недорезов знакомит участников с собой, рассказывает о своём опыте и подходе, а также объясняет, как устроен практикум. Главная задача урока — помочь каждому участнику определить личные цели обучения и измерители успеха.

## Чему вы научитесь
- Понимать, на каких двух фокусах строится курс — риторика и техника речи
- Формулировать собственные цели обучения и ожидания от процесса
- Определять измеримые критерии успеха (внутренние и внешние)
- Видеть свою «точку B» — каким вы хотите стать к концу обучения
- Использовать первое видео-о-себе как точку отсчёта и измеритель прогресса

## Ключевые тезисы
- Специализация тренера — «риторика для жизни и бизнеса»: правила универсальны и в деловой среде, и в общении с близкими.
- Опыт тренера: работа с топ-менеджерами и руководителями, телеведущий, пресс-секретарь в фонде Росприроднадзора, предвыборная кампания В. Жириновского, советник депутата Госдумы, подготовка команды к выступлению перед президентом (2020), более 300 часов коучинговой практики, 9 лет преподавания.
- Программа курса строится на двух фокусах: риторика (содержание, логика, убеждение, ответы на сложные вопросы) и техника речи (дыхание, работа с голосоречевым аппаратом, удержание внимания).
- У всех участников схожий запрос — говорить эффективно, влиять речью, убеждать, складывать образ эксперта.
- В конце практикума участники запишут самопрезентацию со всеми изученными инструментами — это позволит сравнить «себя до» и «себя после».
- По окончании курса выдаётся сертификат об успешном обучении.
- Важно оцифровать цель: не просто «хочу научиться», а понять, как именно вы поймёте, что цель достигнута.
- Измерители успеха могут быть внутренними (уверенность, отсутствие волнения, скорость подготовки) и внешними (обратная связь от руководителя, выступления на форумах).

## Упражнения и практика
- Саморефлексия по вопросам о целях и ожиданиях от курса.
- Определение личных измерителей успеха на старте практикума (тренер вернётся к ним в финале).

## Домашнее задание
- Записать короткое видео о себе и отправить в Telegram-чат практикума, ответив на пять вопросов: что привело на курс / что стало отправной точкой; чего вы ожидаете от процесса обучения; как видите результат (точка B); в чём ваша главная цель развития навыков коммуникации; как вы поймёте, что цель достигнута.

## Главная мысль
> Прежде чем учиться говорить, оцифруйте свою цель: определите, каким вы хотите стать и как поймёте, что цель достигнута.

# 1.02 Принципы построения качественной самопрезентации

- **Модуль:** 1. Самопрезентация
- **Видео:** 1 02 Принципы построения качественной самопрезентации.mp4
- **Презентация:** 1 02 Принципы построения качественной самопрезентации.pdf
- **Хронометраж:** ~11 мин

## О чём урок
Урок о принципах сильной самопрезентации: как рассказывать о себе так, чтобы это было интересно собеседнику, а не выглядело хвастовством. Тренер разбирает «золотое правило» самопрезентации и типичные ошибки — от отсутствия цели до невербальных промахов.

## Чему вы научитесь
- Презентовать свои сильные стороны без перекоса в хвастовство
- Применять «золотое правило»: я такой — и вот чем это полезно тебе
- Ставить цель самопрезентации и учитывать цели аудитории
- Распознавать и избегать главных ошибок самопрезентации
- Считывать невербальные сигналы и управлять зрительным контактом, позой, жестами
- Вовлекать аудиторию и вкладывать энергию в рассказ о себе

## Ключевые тезисы
- Самопрезентация — это не только рассказ «какой я», но и демонстрация того, чем ваша уникальность ценна для других.
- «Золотое правило»: после фактов о себе делайте мостик пользы — «я такой, но для тебя это полезно вот чем».
- Пример тренера: не просто «я тренер по риторике, работал на РВК и в Госдуме», а «ко мне приходят, когда хотят выступать ярче и не тратить время на подготовку» — собеседник сразу видит свою выгоду.
- У самопрезентации должна быть цель; нужно удовлетворять и свою цель, и цель аудитории.
- Ошибка — одна стандартная история на все случаи: презентация должна быть разной под типовые ситуации.
- Ошибка — обезличенность: если вашу визитку можно скопировать коллеге и она подойдёт, она плохая. Рассказ о себе должен быть уникальным.
- Невербалика критична: избегание зрительного контакта читается как недоверие или неискренность; закрытые позы (руки на груди, отклонение назад, поза боком) — как нежелание общаться.
- Суета и избыток жестов (часто у экстравертов) отвлекают — их стоит минимизировать.
- Управляйте процессом и вовлекайте: замечайте сигналы потери внимания, делайте паузы, задавайте вопросы — это показывает заботу о собеседнике.
- Плохая самопрезентация — это скучная автобиография «родился, женился, переехал» без энергии; вкладывайте энергию и интерес в диалог.

## Главная мысль
> Хорошая самопрезентация держит золотую середину: «я такой — и вот чем это может быть полезно тебе».

- Понимать механику диафрагмального дыхания и роль диафрагмы как «насоса» лёгких

## Ключевые тезисы
- Голос — это «озвученный выдох»: как дышишь, так и звучишь и чувствуешь себя.

- При поверхностном дыхании нижняя часть лёгких и диафрагма остаются в полуатрофированном состоянии.
- Правильная механика вдоха: вдох через нос «в живот», грудь остаётся неподвижной, выдох — тонкой струйкой (как на свечу).
- Танец живота запускает диафрагму, делает её эластичной — голос становится объёмным, уходит со звучания «на связках».
- Плавный выдох не даёт «проваливать» энергию к концу фразы — каждое слово звучит «на вес золота».
- Объём лёгких позволяет говорить длинные фразы без лишних «доборов» воздуха.

Вторая часть блока о логике речи. На основе тысяч просмотренных импровизаций спикер разбирает три типа ораторов и их ошибки, даёт рабочую структуру «Эффективная речь» из четырёх блоков и демонстрирует её на развёрнутом примере импровизации про Мещерский парк.

## Чему вы научитесь
- Узнавать себя в трёх типах ораторов и понимать свои типовые ошибки.
- Формулировать цель коммуникации в зависимости от ситуации.
- Строить речь по структуре: ситуация — проблема — решение — результат.
- Разворачивать блок «решение» через яркий заголовок и три пункта.
- Гибко применять структуру: убирать лишние блоки, не загоняя себя в жёсткие рамки.
- Готовить и записывать структурированную импровизацию для сравнения с замером «до».

## Ключевые тезисы
- Три группы: интуитивно успешные (менее 10%), средний уровень (теряют нить, не знают как начать/закончить, сухость) и те, кому не хватает на 5–7 минут.
- Большинство проблем — от отсутствия понимания, как выстроить структуру речи; у публики это рождает недоверие.
- Логика речи — умение правильно организовать мысли и передать их слушателю в логической последовательности ради желаемого результата.
- В каждой ситуации цель разная: рассмешить друзей, получить полномочия/деньги/время, пройти собеседование.
- Структура «Эффективная речь» — 4 блока: **Ситуация** (контекст, ~1 мин) → **Проблема** (конфликт, ~1 мин) → **Решение** (самый большой блок) → **Результат** (итог, ~1 мин).
- Повествование выигрывает, когда строится на конфликте: проблему дают до решения, а не сразу выдают ответ.
- Решение оформляется яркой фразой-заголовком (якорь месседжа), которая раскрывается в три логичных пункта с примерами.
- Схема — не «поводок для мучений», а способ упростить жизнь; её можно применять целиком или частями (например, убрать «ситуацию», если она известна слушателю).
- Пример «Мещерский парк»: лес и активный отдых → активности круглый год → уютная лесная чайная — три пункта вместо общих слов «классный, крутой парк».

- Взять ту же тему, что и в первом уроке (по которой уже есть запись «до»), и структурировать её по четырём блокам, набросав по несколько предложений в каждый.
- Представить конкретных слушателей, включить камеру и записать новое выступление.
- Сравнить вторую запись с первой, оценив прогресс; посмотреть выступления других участников курса для вдохновения.

## Чему вы научитесь
- Различать «разум» (логика, тезисы, факты) и «сердце» (примеры, эмоции, образы) в речи.

- Балансировать логичность и искреннюю свободу подачи.
- Готовить выступление к практикуму и оценивать его по шести параметрам.

## Ключевые тезисы
- Архитектура речи = логическая конструкция (разум) + эмоциональное наполнение (сердце), как здание = инженерия + замысел архитектора.
- В режиме перегруза мы сжимаемся до сухих формулировок; понятное «для нас» — непонятно слушателю.
- Пример клиентки: «очень эффективно» — пустая фраза; «вышли на выгоду 20% против 3–5% у аналогов» — это уже образ и сравнение.
- Мы мыслим картинками: даёшь картинку — собеседник запоминает.
- Метафора преподавателей: «сухари» дают теорию без историй, «весельчаки» — истории без сути; оба варианта мешают усвоению — нужен баланс.
- Деталь оживляет проблему: вместо «я столкнулся с бессонницей» — «лежу час, слышу каждый шорох, машину на тихой улице».
- В блоке «решение» каждый из трёх пунктов усиливается по схеме «разум + сердце» (например, мелатонин + личная история из детства про плотные шторы).
- Если времени мало — эмоцию можно оставить в первом и третьем пунктах (завязка и кульминация), а второй сделать ёмким.
- На практикуме обратную связь дают по шести параметрам: логика, дикция/интонация/пауза, жесты, искренность, взаимодействие с публикой, общее впечатление.

## О чём урок
Урок о базовых принципах жестикуляции и силе ладоней. Спикер объясняет, как жестикулировать естественно и в контексте, разбирает понятие "коробки жестов", асимметрию и три базовые позиции рук, а также положение ног. Даёт ориентир на материалы Алана Писа.

## Чему вы научитесь
- Жестикулировать естественно, сообразно своему темпераменту и настроению
- Соотносить жесты со словами и читать их в контексте
- Использовать "коробку" жестов и не закрываться от аудитории
- Применять асимметричные жесты для большей выразительности
- Различать и применять три базовые позиции рук
- Правильно ставить ноги и держать руки в покое

## Ключевые тезисы
- Не пытайтесь резко начать много жестикулировать, если это вам несвойственно — будет неестественно ("Барби и Кен с пластиковыми руками")
- Тренировка идёт из точки А в точку Б, постепенно
- Жесты должны быть правдоподобны и соответствовать словам; рассогласование (например, "рад видеть" с покачиванием головой "нет") выдаёт человека
- Жесты нельзя вырывать из контекста — смотрим, что было до, в момент и после сигнала
- "Коробка" жестов ограничена плечами и до верха груди/живота; жестикуляция у самого лица и груди создаёт защитную (дефицитную) позицию
- Лучше жестикулировать в районе солнечного сплетения или живота — это расслабленные, незащищённые жесты
- На большой сцене "коробка" расширяется до полного размаха
- Асимметричные жесты выглядят интереснее симметричных-зеркальных
- В покое руки лежат перед собой (сидя) или свободно свисают вдоль тела (стоя) — без зажатых кулаков и закрытого паха
- Три базовые позиции рук: мяч в руках (ладони на ребре — лидерство), ладони вверх (открытость, честность), ладони вниз (власть, убедительность)
- Ноги: не на ширине плеч (агрессивно), а на расстоянии примерно одной ступни; можно одну ногу чуть вперёд

- Тренировать естественные жесты постепенно, начиная с простых

- Способ "куда деть руки": собрать в пирамиду или положить перед собой
- Тренировка стойки: ступни на расстоянии одной ступни, спортивная стойка

- В начале выступления смотрите чаще на позитивных, открытых, кивающих слушателей — это снижает волнение
- Делите аудиторию на сегменты (3 блока, при необходимости и в глубину) и постоянно сканируйте пространство — это заложенный природой механизм безопасности
- Формула "одна мысль — одна пара глаз": доносите целую мысль одному человеку, ловя невербальное подтверждение, затем переключаетесь
- Здоровое соотношение взгляда: ~60% — в глаза, ~40% — на материалы/в сторону, чтобы не "передавливать"
- Можно переносить взгляд на "третью точку" (между бровями) для разрядки контакта
- На камеру нужно "пробивать пуленепробиваемое стекло" энергией — живой голос, взгляд и мимика; публика отзеркаливает ваше состояние
- Прямая осанка = уверенность + правильная работа диафрагмы и голоса; не втягивать голову ("бесшейная сова")
- Движение по сцене: от мысли к мысли, по сюжету истории (в зеркальном для аудитории направлении), используя всё доступное пространство
- Перемещение включает рептильный мозг аудитории и собирает внимание ("альфа-самец близко")
- Жестикуляция активна от локтя ("не лапки тираннозавра"); важно как человек сидит и держит ноги

## Упражнения и практика
- Упражнение "Смотри, каша": произносить одну фразу с разными эмоциями (радость, недовольство, гнев, отвращение и т.д. — 8 пунктов), играя голосом, мимикой и жестами
- Тренировка мимики у зеркала, затем запись себя на видео
- Упражнение "зажмурить булки": напрячь ягодицы и ноги для монументальности внизу и свободы вверху, чтобы не переминаться с ноги на ногу
- Тренировка на камеру телефона: рассказывать новости, пересказывать книги, прогонять речь с живой мимикой
- Анализ публичных личностей (Сергей Собянин, Герман Греф) на предмет осанки, взгляда, рук и посадки

## Домашнее задание
- Выполнить упражнение "Смотри, каша" по всем эмоциям и записать видео как домашнюю работу
- Тренировать мимику у зеркала, изображая разные эмоции

> Включайте искреннюю эмоцию в лицо и глаза, держите контакт по формуле "одна мысль — одна пара глаз", и управляйте вниманием через осанку и движение по сцене.

## О чём урок
Теоретический фундамент модуля: как стать собеседником, общение с которым вызывает доверие и ощущение безопасности. Разбираются механика доверия и недоверия (работа мозга), параметры психологической безопасности и коучинговые техники её создания.

## Чему вы научитесь
- Создавать пространство психологической безопасности для собеседника
- Поддерживать собеседника, а не «спасать» его в неловкой ситуации
- Избегать критики, оценок и непрошенных советов в диалоге
- Создавать чёткие договорённости и соблюдать их
- Вести разговор на равных (позиция «я ок — ты ок»)
- Проявлять искренний интерес и активно слушать

## Ключевые тезисы
- Собеседник мечты — тот, кто развивает доверие и создаёт ощущение безопасности
- Безопасность складывается из двух частей: защита достоинства собеседника + поддерживающая коммуникация
- Поддерживающая коммуникация: помочь человеку самому найти ответ наводящими вопросами, а не давать готовый
- Психологическая безопасность возникает без критики и оценок, при принятии человека таким, какой он есть, и уважении его выбора
- За доверие отвечает префронтальная кора, за недоверие — рептильный мозг (миндалевидное тело)
- Доверие взращивается медленно, а разрушается мгновенно; аудитория не обязана доверять с первых секунд
- Угрозу мозг считывает в поучениях, оценке, критике, непрошенных советах и директивности
- Партнёрские формулировки («как вы считаете...») вместо директивных («давайте дальше») укрепляют доверие
- Договорённости (время, ответы на вопросы) нужно выполнять — иначе теряется доверие к эксперту
- Четыре правила Глеба Жеглова: разговаривать и улыбаться, двигать к разговору о нём самом, найти интересную тему, проявлять искренний интерес («проникнуть в человека»)

## Упражнения и практика
- Коучинговое упражнение: вспомнить человека, рядом с которым было ощущение полной психологической безопасности; классифицировать, что он делал и чего не делал, и сформулировать тезисы
- Просмотр и разбор отрывка из фильма «Место встречи изменить нельзя» (правила Жеглова) как примера эффективной коммуникации

## Домашнее задание

- Выполнять обещания, данные слушателям (например, отвечать на вопросы в конце)

- Практиковать активное слушание в повседневном общении

## О чём урок
Практический урок-инструмент о том, как вовлекать аудиторию вопросами. Разбираются причины важности вопросов, три типа вопросов (воронка) и встраивание вопросов в структуру выступления «ситуация — проблема — решение — результат».

## Чему вы научитесь
- Устанавливать контакт с аудиторией с помощью вопросов
- Различать и применять закрытые, открытые и уточняющие вопросы
- Использовать «воронку» вопросов для углубления беседы
- Поддерживать динамику выступления, когда внимание падает
- Встраивать вопросы в каждый блок структуры выступления
- Вовлекать аудиторию каждые 3–5 минут

## Ключевые тезисы
- Вопросы устанавливают контакт, создают эмоциональную связь и показывают заботу о собеседнике
- Через вопросы вы лучше понимаете аудиторию и можете уточнять детали
- Вопросы стимулируют обмен идеями и делают выступление глубже и интереснее
- Вопросом можно вернуть динамику, когда видно, что аудитория заскучала
- Вопросы развивают мышление и критический анализ у обеих сторон
- Три типа: закрытые (да/нет, для разогрева), открытые (для развёрнутых ответов), уточняющие (углубление по «зацепке» в ответе)
- Принцип воронки: от закрытого/открытого к уточняющему, сужая фокус на интересной части ответа
- Пример мастерства — интервьюеры (Познер и др.): цитируют, цепляются за ответ, задают уточняющие
- Открытые вопросы предпочтительнее для синхронизации с аудиторией
- Из-за дефицита внимания вовлекать нужно регулярно, каждые 3–5 минут; вопрос можно ставить перед, внутри или после блока

## Упражнения и практика
- Система вовлечения из 4 шагов: ведёте речь → погружаете в проблему → открытым вопросом вовлекаете → получаете ответ → включаете приём активного слушания → продолжаете речь
- Структура «ситуация — проблема — решение — результат» с вопросом в каждом блоке (в «решении» — по вопросу на каждый из трёх шагов)

- Вовлекать аудиторию каждые 3–5 минут

## О чём урок
Завершающий урок модуля о приёмах активного слушания. Разбираются четыре рациональных приёма (эхо, резюмирование, логическое следствие, уточнение) и эмоциональная составляющая (невербалика, повторение эмоций). Подводится итоговая формула собеседника мечты.

## Чему вы научитесь
- Понимать чувства и мысли собеседника через приёмы активного слушания
- Применять четыре приёма: эхо, резюмирование, логическое следствие, уточнение
- Подкреплять слушание невербаликой и эмоциональным повторением
- Удерживать фокус на диалоге, не «улетая» в свои мысли
- Создавать собеседнику безопасное пространство «выпустить пар»
- Проводить рефлексию своей коммуникации после разговоров

## Ключевые тезисы
- Активное слушание — способ точнее понять состояние, чувства и мысли собеседника через особые приёмы участия в беседе
- Метафора замка-молнии: чем больше приёмов слушания, тем крепче связь между собеседниками
- Эхо — дословное повторение сказанного («ага, ты говоришь, что...»)
- Резюмирование — сжатое обобщение того, что сказал собеседник
- Логическое следствие — построение вывода из сказанного, без оценки, со сверкой («правильно я понял?»)
- Уточнение — уточняющие вопросы как демонстрация вовлечённости; цепочка приёмов может быть длинной
- Эмоциональная составляющая: зрительный контакт, кивки, наклон корпуса, звуки одобрения, повторение эмоции собеседника
- Эмоциональное повторение показывает, что вы услышали и запомнили; человек раскрывается и чувствует безопасность
- Важно оставаться открытым и терпимым, не перебивать, не оценивать — у собеседника есть право на свою точку зрения и эмоцию
- Качество коммуникации — это удержание фокуса на себе, собеседнике и предмете беседы (коучинговый принцип)
- Пример из сериала (Эмми и Шелдон): вопросы заданы технично, но без эмоционального включения — этого нельзя упускать

## Упражнения и практика
- Отработка четырёх приёмов на примере «управления энергией» с вводными фразами
- Разбор негативного примера (диалог без эмоционального включения) для контраста
- Самоанализ/рефлексия после разговоров: что получилось, что улучшить, где проявил активное слушание
- Первый практический шаг — выступление с вовлечением (из предыдущего урока) + рефлексия

## Домашнее задание
- Применять приёмы активного слушания в реальной жизни (с близкими, коллегами, любыми людьми)
- Уделять внимание собеседнику, убирая отвлекающие факторы (телефон и пр.)
- Практиковать невербальные сигналы: взгляд, мимику, жесты
- Задавать уточняющие вопросы для продолжения разговора
- Проводить рефлексию применения активного слушания

> Формула собеседника мечты: пространство доверия и безоценочности, эмпатия, вопросы и активное слушание.

- Создавать карту выступления (тезисный план) и интригу/крючок внимания
- Готовить заключение с выводами, моралью и призывом

- Пять блоков плана: вход в ситуацию (приветствие и самопрезентация), введение (тема + тезисный план + регламент + интрига), главная часть, заключение, вывод.
- Не начинать «с корабля на бал» («Здравствуйте, я Евгений Недорезов, тема такая») — нужен захват внимания.
- Тезисный план — это карта/маршрут выступления, формирует ожидание, которое легче оправдать.
- Интрига строится на интересах и потребностях аудитории, поэтому важно её исследовать заранее.
- «Бургер»: верхняя булочка — тезис, котлета — аргумент (для разума), овощи и соус — поддержка (эмоции), нижняя булочка — микровывод.
- Тезис — главная мысль; оптимально три тезиса (правило триады), законченное утвердительное суждение, лучше с глаголом; не слоган и не вопрос; без фактов внутри.
- Типы аргументов: личный опыт, авторитетное/экспертное мнение, статистика, общественное мнение. На тезис — 1–3 аргумента.
- Аргумент — без эмоций; эмоции и истории добавляются в блоке поддержки.
- Заключение объединяет микровыводы, повторяет ключевые мысли, содержит мораль/пожелание и благодарность; интригу можно раскрыть в финале.
- Один тезис + один аргумент + поддержка + вывод — это примерно 12–15 минут.

## Упражнения и практика
- Использовать пустой бланк плана выступления из PDF (самопрезентация, тема, тезисный план, интрига, три тезиса с аргументами и поддержкой, вывод, мораль) — распечатать и заполнить от руки.
- Посмотреть разбор речи Стива Джобса по хронометражу (под видео).

# Практикум 1 — Разбор самопрезентаций

- **Тип:** Практическое занятие (групповой разбор)
- **Хронометраж:** ~128 мин

## О чём практикум
Первое групповое занятие: участники по очереди показывают свои видео-самопрезентации, тренер и группа дают обратную связь по правилу «3 плюс 1» (три успеха и одна точка роста). Разбираются типовые ошибки самопрезентации на примере «до/после» и невербалика (жесты, поза, взгляд).

## Что разбирали / отрабатывали
- Сбор обратной связи по первому модулю и оргвопросы (когда открывать материалы).
- Структура самопрезентации: кто я сейчас и чем полезен, а не автобиография «работал там, там, там».
- Правило обратной связи «3 плюс 1» и цикл Колба (опыт → рефлексия → корректировка → новое действие).
- Разбор самопрезентаций каждого: формулировки, «розовые пони» vs конкретика и цифры, призыв к действию.
- Невербалика: камера на уровне глаз, поза Меркель и жест-«палец», открытые ладони, контакт глазами онлайн (лайфхак со стикером-флажком).
- Когнитивные искажения и психология уверенности («я окей — ты окей», сравнивать себя с собой вчерашним).

## Полезные выводы и рекомендации тренера
- Самопрезентация — до 1,5–2 минут; начинать с пользы и пользы для слушателя, а не с биографии.
- Подкреплять экспертность измеримыми результатами (цифры, проценты, кейсы), убирать узкопрофессиональные ярлыки блоков.
- Звуки-паразиты не критичны — снижать требовательность к себе, но проработать.
- Завоёвывать аудиторию заранее: приходить раньше, общаться, выяснять потребности.
- Для коротких форматов есть отдельная структура «от боли клиента» (elevator pitch на 30 секунд).

# Практикум 2 — Дикция, дыхание и голос

- **Тип:** Практическое занятие (групповой разбор)
- **Хронометраж:** ~100 мин

## О чём практикум
Практикум по технике речи: участники делятся успехами в домашних упражнениях, затем все вместе под руководством тренера выполняют артикуляционную гимнастику, упражнения с пробкой, скороговорки, вибрационный массаж и упражнения на раскрытие голоса (тон, громкость, мягкое нёбо).

## Что разбирали / отрабатывали
- Дыхание животом vs грудью, борьба с привычкой втягивать живот и обрывистым дыханием.
- Артикуляционная гимнастика: покусывание языка, протыкание щёк, оскал, работа с асимметрией лица.
- Упражнения с пробкой в режиме активной артикуляции, длинная скороговорка «скороговоруны».
- Вибрационный массаж (постукивание по лбу, груди, ключице, костям) для раскрытия и понижения голоса.
- Три уровня голоса (середина, верх, низ), упражнение «галя-гаммо», мягкое нёбо, упражнение «разбег, прыжок».
- Связь голоса с дыханием: голос садится, когда говоришь «на связках», а не на выдохе.

## Полезные выводы и рекомендации тренера
- Золотое правило при нехватке времени: 7 минут артикуляция + 7 минут пробка; встраивать в быт (гладишь, едешь в лифте).
- Дикция качается быстрее, голос — медленнее; нужна регулярность (хоть 3–5 минут ежедневно).
- Низкий голос = выдох + приподнятое мягкое нёбо; чтобы говорить ниже — замедляться.
- Различать два параметра: громкость и тон (можно говорить тихо, но низко, и наоборот).
- Записывать прогресс на видео и сравнивать «до/после»; читать вслух нараспев, выделяя ударные.

# Практикум 3 — Импровизация: разум и сердце, структура выступления

- **Тип:** Практическое занятие (групповой разбор)
- **Хронометраж:** ~133 мин

## О чём практикум
Участники обсуждают трудности с домашними заданиями и записью видео, разбирают принцип «говорить разумом и сердцем» (теория + личные примеры). Затем каждый за пару минут готовит экспресс-импровизацию по структуре «ситуация — проблема — решение — результат» и получает обратную связь по чётким критериям.

## Что разбирали / отрабатывали
- Подготовка vs импровизация: «лучшее спонтанное выступление — хорошо подготовленное»; заключение «контракта» с аудиторией.
- Принцип «разум и сердце»: теория для понимания + личные истории и примеры для запоминания (сторителлинг, образы).
- Экспресс-подготовка структуры выступления за 2–3 минуты на свободную тему.
- Обратная связь по пунктам: логика, дикция, интонация, паузы, жесты, взаимодействие с публикой, общее впечатление.
- Разбор выступлений (София о коучинге, Олег об отцовстве, Кира о страхе): раскрытие тезисов через примеры, закольцовка темы, твёрдый финал.
- Преодоление страха публичности: «просто сделай шаг», снижение градуса ответственности.

## Полезные выводы и рекомендации тренера
- Любой тезис нужно «проваливать» до конкретных примеров и шагов, иначе остаётся «розовый туман».
- Финал замыкает тему и оправдывает структуру — вернуться к заявленному в начале одной фразой.
- Рефлексию строить с успехов («3 плюс 1»), а не с самобичевания; экологичная поддерживающая среда.
- Замедление речи даёт спокойствие и понижает голос; работать с дикцией и словами-паразитами (заменять паузами).
- Выбирать близкую, «живущую» тему — это даёт энергию и пространство для взаимодействия.

# Практикум 4 — Невербалика и язык тела

- **Тип:** Практическое занятие (групповой разбор)
- **Хронометраж:** ~132 мин

## О чём практикум
Практикум по невербальной коммуникации: разбор уместности жестов, закрытых/открытых поз, уязвимых точек. Участники выступают с импровизацией стоя (видно по пояс), сознательно используя жесты-иллюстраторы, и получают развёрнутую обратную связь по языку тела и структуре.

## Что разбирали / отрабатывали
- Жесты в зависимости от контекста и цели коммуникации: открытые ладони vs давящие жесты, «ребро ладони».
- Закрытые позы и «пузырь личного пространства», уязвимые точки (рот, шея, солнечное сплетение, пах), адаптеры.
- Жесты-иллюстраторы с чётким началом и концом; асимметричные жесты, «выключить» одну руку.
- Импровизации участников (Кира — чем полезна, Джамиля — геймификация тренингов, Олег — финансы, Наташа — мечта о TED, София — кейс наставничества).
- Структура и драматургия: гениальное начало и продуманный финал, чтобы энергия не «проваливалась» в конце.
- Самокоучинг: перефокусировка мышления, отслеживание реакций, определение сильных сторон.

## Полезные выводы и рекомендации тренера
- Жесты держать в области живота/солнечного сплетения, чтобы было видно; избавляться от сжатых кулаков.
- Формула тренировки: одно слово — один жест, одна фраза — один жест; внедрять осознанно, потом войдёт в автомат.
- Расшифровывать узкопрофессиональные термины для внешней аудитории.
- Убирать уменьшительно-ласкательные и неопределённые слова («какие-то», «немножечко»).
- Замедлять речь (читать нараспев), не уходить в излишнюю конкретизацию — ставить точку, когда мысль раскрыта.
- Подкреплять выступление конкретными примерами и кейсами, обозначать боли аудитории.

# Практикум 5 — Активное слушание и вовлечение аудитории

- **Тип:** Практическое занятие (групповой разбор)
- **Хронометраж:** ~141 мин

## О чём практикум
Практикум по взаимодействию с аудиторией: участники выступают с импровизацией, добавляя инструмент вопросов и активного слушания (эхо, резюме, уточнение, логическое следствие). Темы выступлений личные и профессиональные (плохое настроение, культура ношения очков, путешествия, прокрастинация), после каждого — обратная связь.

## Что разбирали / отрабатывали
- Инструмент вопросов (закрытый/открытый + уточняющий) и активное слушание в эмоциональной синхронизации с собеседником.
- Управление процессом: оратор остаётся ведущим, не передаёт «эстафету», ограничивает число ответов, делает мостики и переходы.
- Инструмент «вспомните/представьте» для возбуждения воспоминаний и вовлечения.
- Выступления-разборы: Кира (плохое настроение — норма, методы принятия), Джамиля (мини-презентация про оптику с вопросами к залу), Олег (рецепт путешествий), Наташа (прокрастинация, правило 72 часов).
- Преодоление прокрастинации: энергия идеи и правило 72 часов, публичное заявление, делегирование, ответственность перед другими.

## Полезные выводы и рекомендации тренера
- Люди любят говорить о себе — фокус на собеседнике вовлекает сильнее, чем самопрезентация.
- Не все должны отвечать: 1–2 вопроса достаточно, остальных можно вовлечь в начале или финале.
- Создавать безопасную атмосферу для молчунов — это почти ничего не стоит, но запоминается надолго.
- Онлайн менять динамику картинки (демонстрация экрана то включать, то выключать) для удержания внимания.
- Избегать самобичевания вслух («вот видите, как у меня с импровизацией») — это снижает кредит доверия.

  s=String(s).trim();

  if(m) return m[1].replace(/&amp;/g,'&');
  // уже готовая ссылка плеера
  if(/video_ext\.php/i.test(s)) return s.replace(/&amp;/g,'&');
  // ссылка вида .../video-227623222_456239018 (возможно с hash)
  m=s.match(/video(-?\d+)_(\d+)/i);
  if(m){

    const h=s.match(/[?&]hash=([0-9a-zA-Z]+)/);

  const email=document.getElementById('email').value.trim().toLowerCase();
  const pass=document.getElementById('pass').value;
  const err=document.getElementById('loginErr');
  const u=USERS[email];
  if(!u || u.pass!==pass){
    if(err) err.classList.remove('hidden');
    return;
  }
  if(err) err.classList.add('hidden');
  USER={email, name:u.name};
  localStorage.setItem('yag_user',JSON.stringify(USER));
  enterApp();
}
function logout(){ localStorage.removeItem('yag_user'); USER=null; location.reload(); }
function enterApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').style.display='block';
  document.getElementById('avatar').textContent=(USER.name||'У').charAt(0).toUpperCase();
  buildNav(); showDashboard();
}

/* ===================== НАВИГАЦИЯ ===================== */
function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  MODULES.forEach(m=>{
    const mp=modProgress(m.n);
    const wrap=document.createElement('div'); wrap.className='mod'; wrap.id='mod-'+m.n;
    const meta = m.n===7 ? `${m.lessons.length} материалов` : `${mp.d}/${mp.t} · ${mp.pct}%`;
    wrap.innerHTML=`
      <div class="mod-head" onclick="toggleMod(${m.n})">
        <div class="mod-num">${m.n===0?'0':(m.n===7?'★':m.n)}</div>
        <div class="mod-title">${m.title}<div class="mod-meta">${meta}</div></div>
        <div class="chev">▶</div>
      </div>
      <div class="lessons">
        ${m.lessons.map(l=>`
          <div class="les ${DONE[l.id]?'done':''}" id="les-${l.id}" onclick="openLesson('${l.id}')">
            <span class="dot">${DONE[l.id]?'✓':''}</span>
            <span class="lt">${l.title}</span>
          </div>`).join('')}
      </div>`;
    nav.appendChild(wrap);
  });
}
function toggleMod(n){ document.getElementById('mod-'+n).classList.toggle('open'); }
function toggleSide(){ document.getElementById('sidebar').classList.toggle('show'); document.getElementById('scrim').classList.toggle('show'); }
function closeSide(){ document.getElementById('sidebar').classList.remove('show'); document.getElementById('scrim').classList.remove('show'); }

/* ===================== РЕНДЕР КОНСПЕКТА (markdown → секции) ===================== */
function mdInline(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}
function pickIcon(title){
  const t=title.toLowerCase();
  if(t.includes('чём')||t.includes('чем ')) return '📖';
  if(t.includes('научит')) return '🎯';
  if(t.includes('тезис')||t.includes('разбирал')) return '📝';
  if(t.includes('упражн')||t.includes('практик')||t.includes('отрабат')) return '🏋️';
  if(t.includes('домашн')||t.includes('задани')) return '✅';
  if(t.includes('главн')) return '💡';
  if(t.includes('вывод')||t.includes('рекоменд')) return '⭐';
  return '•';
}
function renderSection(s){
  let out=''; let list=[]; let quote=[];
  const flushList=()=>{ if(list.length){ out+='<ul>'+list.map(li=>`<li>${mdInline(li)}</li>`).join('')+'</ul>'; list=[]; } };
  const flushQuote=()=>{ if(quote.length){ out+=`<div class="mainidea">${quote.map(mdInline).join(' ')}</div>`; quote=[]; } };
  for(const line of s.body){
    if(line.startsWith('- ')){ flushQuote(); list.push(line.slice(2)); }
    else if(line.startsWith('> ')){ flushList(); quote.push(line.slice(2)); }
    else if(line.trim()===''){ flushList(); flushQuote(); }
    else { flushList(); flushQuote(); out+=`<p>${mdInline(line)}</p>`; }
  }
  flushList(); flushQuote();
  return `<div class="secblock"><h2><span class="i">${pickIcon(s.title)}</span> ${s.title}</h2>${out}</div>`;
}
function renderKonspekt(md){
  const lines=md.replace(/\r/g,'').split('\n');
  const sections=[]; let cur=null;
  for(const raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(line.startsWith('## ')){ if(cur) sections.push(cur); cur={title:line.slice(3).trim(), body:[]}; }
    else if(cur){ cur.body.push(line); }
    // строки до первого "## " (заголовок H1 и метаданные) пропускаем — они уже в шапке урока
  }
  if(cur) sections.push(cur);
  return sections.map(renderSection).join('');
}

/* ===================== LESSON ===================== */
function openLesson(id){
  closeSide();
  curLesson=id;
  const idx=allLessons.findIndex(l=>l.id===id);
  const L=allLessons[idx];
  const prev=allLessons[idx-1], next=allLessons[idx+1];
  document.getElementById('mod-'+L.mod).classList.add('open');
  document.querySelectorAll('.les.active').forEach(e=>e.classList.remove('active'));
  const le=document.getElementById('les-'+id); if(le) le.classList.add('active');

  const tags=[];
  tags.push(`<span class="tag">📦 ${L.modTitle}</span>`);
  if(L.duration) tags.push(`<span class="tag">⏱ ${L.duration}</span>`);
  if(L.practicum) tags.push(`<span class="tag">🎭 Практикум</span>`);
  if(L.material) tags.push(`<span class="tag">📎 Материал</span>`);

  // Видео-блок: приоритет — встроенный плеер ВК (играет прямо на странице);
  // если ссылки ВК нет — открываем в плеере Яндекс.Диска новой вкладкой.
  let videoBlock='';
  const vkSrc = vkEmbedSrc(VK_VIDEOS[id]);
  if(vkSrc){
    videoBlock=`
    <div class="player" id="player">
      <iframe src="${vkSrc}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" allowfullscreen frameborder="0"></iframe>
      <div class="watermark">${USER.email}</div>
    </div>
    <div class="lockbar">🔒 Просмотр только для учеников курса. Скачивание и копирование видео ограничено.</div>`;
  } else if(L.video){
    videoBlock=`
    <a class="player" id="player" href="${yaLink(L.video)}" target="_blank" rel="noopener">
      <div class="watermark">${USER.email}</div>
      <div class="play">▶</div>
      <div class="phint">Смотреть видео урока<br><span style="opacity:.7">откроется в плеере Яндекс.Диска в новой вкладке</span></div>
    </a>
    <div class="lockbar">🔒 Просмотр только для учеников курса. Скачивание и копирование видео ограничено.</div>`;
  } else if(L.material && L.slides){
    videoBlock=`<div class="lockbar">📎 Это материал для просмотра. Откройте файл ниже.</div>`;
  }

  // Материалы — открываются в новой вкладке (просмотр, не скачивание)
  const mats=[];
  if(L.slides) mats.push(`<a class="matbtn" href="${fileLink(L.slides)}" target="_blank" rel="noopener"><span class="mi">📊</span> ${L.material?'Открыть материал':'Открыть презентацию'}</a>`);
  (L.extra||[]).forEach(x=> mats.push(`<a class="matbtn" href="${x.vk||fileLink(x.file)}" target="_blank" rel="noopener"><span class="mi">${(x.vk||/\.(mp4|mov)$/i.test(x.file))?'🎬':'📁'}</span> ${x.label}</a>`));

  // Полный текстовый конспект из встроенного markdown (на основе транскрибации урока)
  let bodyHtml='';
  const mdEl=document.getElementById('md-'+id);
  if(L.notesHtml){
    bodyHtml = L.notesHtml;
  } else if(mdEl){
    bodyHtml = renderKonspekt(mdEl.textContent);
  } else {
    bodyHtml = `<div class="secblock"><h2><span class="i">📖</span> О чём ${L.practicum?'практикум':(L.material?'материал':'урок')}</h2><div class="about">${L.about||''}</div></div>`;
    if(L.learn&&L.learn.length) bodyHtml += `<div class="secblock"><h2><span class="i">🎯</span> Чему вы научитесь</h2><ul>${L.learn.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
    if(L.homework) bodyHtml += `<div class="secblock"><h2><span class="i">✅</span> Домашнее задание</h2><div class="about">${L.homework}</div></div>`;
  }

  const doneState = DONE[id];
  const doneBtn = L.material? '' : `
    <button class="donebtn ${doneState?'is-done':''}" onclick="toggleDone('${id}')">
      ${doneState?'✓ Урок пройден':'Отметить как пройденный'}</button>`;

  document.getElementById('main').innerHTML=`
    <div class="crumbs">Курс «Я говорю!» / ${L.modTitle}</div>
    <div class="lesson">
      <h1>${L.title}</h1>
      <div class="ltags">${tags.join('')}</div>
      ${videoBlock}
      ${bodyHtml}
      ${mats.length?`<div class="secblock"><h2><span class="i">📂</span> Материалы урока</h2><div class="matrow">${mats.join('')}</div></div>`:''}
      ${doneBtn}
      <div class="lesson-nav">
        ${prev?`<button class="lnav" onclick="openLesson('${prev.id}')"><small>← Предыдущее</small>${prev.title}</button>`:`<button class="lnav disabled"></button>`}
        ${next?`<button class="lnav next" onclick="openLesson('${next.id}')"><small>Следующее →</small>${next.title}</button>`:`<button class="lnav next disabled"></button>`}
      </div>
    </div>`;
  window.scrollTo(0,0);
}

async function playVideo(encName){
  const name=decodeURIComponent(encName);
  const player=document.getElementById('player');
  if(!player) return;
  player.innerHTML=`<div class="watermark">${USER.email}</div><div class="loader">Загрузка видео…</div>`;
  try{
    const href=await resolveHref(name);
    player.innerHTML=`<div class="watermark">${USER.email}</div>
      <video src="${href}" controls autoplay playsinline controlsList="nodownload noplaybackrate"
             disablepictureinpicture oncontextmenu="return false"></video>`;
  }catch(e){
    // Если браузер заблокировал запрос (CORS) или ссылка недоступна — открываем конкретный файл на Яндекс.Диске
    player.innerHTML=`<div class="watermark">${USER.email}</div>
      <div class="phint">Не удалось встроить видео в этом окружении.<br>
      <a href="${yaLink(name)}" target="_blank" rel="noopener" style="color:var(--acc2)">▶ Открыть видео урока на Яндекс.Диске</a></div>`;
  }
}

// Открыть конкретный файл (презентацию, доп. материал) — пытаемся получить прямую ссылку на файл
async function openYaFile(encName){
  const name=decodeURIComponent(encName);
  const w=window.open('', '_blank');
  try{
    const href=await resolveHref(name);
    if(w){ w.location=href; } else { window.location=href; }
  }catch(e){
    const url=yaLink(name);
    if(w){ w.location=url; } else { window.open(url,'_blank','noopener'); }
  }
}

function toggleDone(id){
  DONE[id]=!DONE[id]; if(!DONE[id]) delete DONE[id];
  saveDone();
  // обновить боковую метку и кнопку
  const le=document.getElementById('les-'+id);
  if(le){ le.classList.toggle('done',!!DONE[id]); le.querySelector('.dot').textContent=DONE[id]?'✓':''; }
  buildNav(); openLesson(id); // перерисовать
  document.getElementById('topProg').textContent=progress().pct+'%';
}
